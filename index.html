<!DOCTYPE html>
<html>
<head>
    <title>Мой Профиль</title>
    <!-- Подключение Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Подключение FontAwesome CSS для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
        }
        .profile-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .profile-picture {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .profile-picture img {
            width: 100%;
            height: auto;
        }
        .profile-name {
            text-align: center;
            margin-top: 20px;
        }
        .profile-info {
            margin-top: 30px;
        }
        .social-links {
            text-align: center;
            margin-top: 20px;
        }
        .social-links a {
            text-decoration: none;
            margin: 0 10px;
            color: #333;
            font-size: 20px;
        }
        .contact-info {
            text-align: center;
            margin-top: 20px;
        }
        .contact-info p {
            font-size: 18px;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 offset-md-2 col-lg-6 offset-lg-3">
                <div class="profile-container">
                    <div class="profile-picture mx-auto text-center">
                        <!-- Вставь здесь ссылку на свою фотографию -->
                        <img src="https://avatars.githubusercontent.com/u/115415995?v=4" alt="Моя фотография" class="img-fluid rounded-circle">
                    </div>
                    <div class="profile-name text-center">
                        <h2 class="h4">Hamlet Sargsyan</h2>
                    </div>
                    <div class="profile-info text-center">
                        <p>I am a beginner programmer from Armenia</p>
                    </div>
                    <div class="social-links">
                        <!-- Добавьте ссылки на социальные сети с иконками FontAwesome -->
                        <a href="https://github.com/HamletSargsyan" target="_blank"><i class="fab fa-github"></i></a>
                        <a href="https://t.me//HamletSargsyan" target="_blank"><i class="fab fa-telegram"></i></a>
                        <a href="https://www.instagram.com/h.a.m.l.e.t_s.a.r.g.s.y.a.n/" target="_blank"><i class="fab fa-instagram"></i></a>
                    </div>
                    
                    <div class="contact-info">
                        <!-- Добавьте контактную информацию здесь -->
                        <p>Email: <a href="mailto:hamlets849@gmail.com">hamlets849@gmail.com</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Подключение Bootstrap JS и jQuery (необходимы для некоторых функциональных элементов Bootstrap) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
